name: islamic_companion
description: A comprehensive Islamic companion app with prayer times, Qibla compass, dhikr counter, hadiths, and short surahs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_compass: ^0.8.0
  google_mobile_ads: ^5.0.0
  url_launcher: ^6.2.2
  vibration: ^2.0.0
  flutter_svg: ^2.0.9
  permission_handler: ^11.1.0
  http: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
