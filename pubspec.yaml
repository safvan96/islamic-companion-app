name: islamic_companion
description: A comprehensive Islamic companion app with prayer times, Qibla compass, dhikr counter, hadiths, and short surahs.
publish_to: 'none'
version: 2.8.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_mobile_ads: ^5.0.0
  url_launcher: ^6.2.2
  audioplayers: ^6.1.0
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  flutter_svg: ^2.0.9
  http: ^1.1.2
  share_plus: ^9.0.0
  flutter_compass: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1
  image: ^4.8.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
